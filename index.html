<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clothing Brand</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to right,#141e30, 3243b55);
    }

    header {
      background: nevy;
      color: silver;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      height: 80vh;
      background: url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd53') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 50px;
      background: rgba(0,0,0,0.5);
      padding: 20px;
    }

    .products {
      padding: 40px;
      text-align: center;
    }

    .product-grid {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 200px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .about, .contact {
      padding: 40px;
      text-align: center;
      background: white;
      margin: 20px;
      border-radius: 10px;
    }

    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>crwuncy</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>your new text</h1>
</section>

<section class="products" id="products">
  <h2>Our Products</h2>
  <div class="product-grid">
    
    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <h3>T-Shirt</h3>
      <p>₹799</p>
      <button onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>Hoodie</h3>
      <p>₹999</p>
      <button onclick="buy()">Buy Now</button>
    </div>

  </div>
</section>

<section class="about" id="about">
  <h2>About Us</h2>
  <p>We are a modern clothing brand focused on style and comfort for teenagers.</p>
</section>

<section class="contact" id="contact">
  <h2>Contact Us</h2>
  <p>Email: mybrand@email.com</p>
</section>

<footer>
  <p>© 2026 crwuncy</p>
</footer>

<script>
  function buy() {
    alert("Product added! (Demo only)");
  }
</script>

</body>
</html>
